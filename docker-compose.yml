services:
  backend:
    build: .
    expose: ["8765"]
    volumes:
      - sjh-data:/app/data
      - hf-cache:/app/.cache/huggingface
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8765/config"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 120s     # 1er boot = téléchargement du modèle MiniLM

  frontend:
    build:
      context: ./ui
      args:
        VITE_API_BASE_URL: "${VITE_API_BASE_URL}"
    expose: ["80"]
    depends_on: [backend]
    restart: unless-stopped

volumes:
  sjh-data: {}
  hf-cache: {}
