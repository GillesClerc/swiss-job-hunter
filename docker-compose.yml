services:
  backend:
    build: .
    expose: ["8765"]
    volumes:
      - sjh-data:/app/data
      - hf-cache:/app/.cache/huggingface
    restart: unless-stopped
    labels:
      - "traefik.http.middlewares.sjh-auth.basicauth.users=${BASIC_AUTH}"
      - "traefik.http.routers.backend.middlewares=sjh-auth"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8765/config"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 120s

  frontend:
    build:
      context: ./ui
      args:
        VITE_API_BASE_URL: "${VITE_API_BASE_URL}"
    expose: ["80"]
    depends_on: [backend]
    restart: unless-stopped
    labels:
      - "traefik.http.middlewares.sjh-auth.basicauth.users=${BASIC_AUTH}"
      - "traefik.http.routers.frontend.middlewares=sjh-auth"

volumes:
  sjh-data: {}
  hf-cache: {}
